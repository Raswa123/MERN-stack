    <h1><i class="fa-solid fa-user fa-fade" style="color: rgb(177, 151, 252);"></i></i>Registration form</h1>
    <form action=""></form>

    <label for="uname">UserName:</label>
    <input type="text" id="uname" placeholder="Enter your username"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email"><br><br>

    <label for="pwd">Password:</label>

    <label for="Address">Address:</label>
    <textarea id="Address" placeholder="Enter your address"></textarea><br><br>

    <label for="dob">DOB:</label>
    <input type="date" id="dob"><br>

    <label for="course">Course:</label>
    <input name="course" type="radio">
    <label for="">CA</label>
    <input name="course" type="radio">
    <label for="">CMA</label>
    <input name="course" type="radio">

   <div>

        <input type="checkbox">

   </div>
