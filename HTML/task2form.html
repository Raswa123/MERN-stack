<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div>
        <style>
            body{
                background-color: rgb(43, 35, 68); text-align: center; 
            }
        </style>
        <h1><u>Registration form</u></h1>
        <form action=""></form>
    
        <label for="uname"><i class="fa-solid fa-user fa-fade" style="color: rgb(116, 192, 252);"></i>Username</label>
        <input type="text" id="uname" placeholder="Username please"><br><br>
        <label for="age"><i class="fa-solid fa-calendar fa-fade" style="color: rgb(116, 192, 252);"></i>Age</label>
        <input type="text" id="age" placeholder="Age please"><br><br>
        <label for="address"><i class="fa-solid fa-house fa-fade" style="color: rgb(116, 192, 252);"></i>Address</label>
        <textarea id="address" placeholder="Type your address here"></textarea><br><br>
        <label for="dob"><i class="fa-solid fa-calendar fa-fade" style="color: rgb(116, 192, 252);"></i>DOB:</label>
        <input type="date" id="dob"><br><br>
        <label for="email"><i class="fa-solid fa-at fa-fade" style="color: rgb(116, 192, 252);"></i>Email:</label>
        <input type="email" id="email" placeholder="xyz@gmail.com"><br><br>
        
        <div>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male"><i class="fa-solid fa-person fa-fade" style="color: rgb(116, 192, 252);"></i>Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female"><i class="fa-solid fa-person-dress fa-fade" style="color: rgb(116, 192, 252);"></i>Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label><br><br>
        </div>
    
    
        <div>
            <label for="Hobbies">Select your hobbies:</label>
            <input type="checkbox" id="gaming" name="Hobbies" value="gaming">
            <label for="gaming">Gaming</label>
            <input type="checkbox" id="reading" name="Hobbies" value="reading">
            <label for="reading">Reading</label>
            <input type="checkbox" id="cooking" name="Hobbies" value="cooking">
            <label for="cooking">Cooking</label><br><br>
        </div>
    
    <div>
        <label for="place">Choose place:</label>
        <select id="place" name="place">
            <option value="Calicut">calicut</option>
            <option value="Malappuram">Malappuram</option>
            <option value="Palakkad">Palakkad</option>
        </select><br><br>
    </div>
    
        <label for="file">Upload CV</label>
        <input type="file" id="file" name="file"><br><br>
    
        
        <input type="button" value="Submit">
        <input type="button" value="Cancel"><br><br>
    
    
    
    </div>


</body>
</html>
